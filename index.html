<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaDing Warehouse Employee System</title>
    <!-- បណ្ណាល័យសម្រាប់ដំណើរការ React ក្នុង HTML -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [lang, setLang] = useState('kh');
            const [user, setUser] = useState(null);
            const [currentPage, setCurrentPage] = useState('home');

            const translations = {
                kh: { title: "ប្រព័ន្ធគ្រប់គ្រងបុគ្គលិក DaDing", checkIn: "ចូលធ្វើការ", checkOut: "ចេញធ្វើការ", dashboard: "ផ្ទាំងគ្រប់គ្រង", status: "ស្ថានភាព", insideZone: "អ្នកស្ថិតនៅក្នុងតំបន់កំណត់", login: "ចូលដោយប្រើ Telegram", welcome: "សួស្តី" },
                en: { title: "DaDing Employee System", checkIn: "Check In", checkOut: "Check Out", dashboard: "Dashboard", status: "Status", insideZone: "Inside attendance zone", login: "Login with Telegram", welcome: "Welcome" },
                zh: { title: "达鼎仓库管理系统", checkIn: "签到", checkOut: "签退", dashboard: "仪表板", status: "状态", insideZone: "在考勤范围内", login: "使用 Telegram 登录", welcome: "欢迎" }
            };

            const t = translations[lang];

            useEffect(() => {
                const tg = window.Telegram?.WebApp;
                if (tg && tg.initDataUnsafe?.user) {
                    setUser(tg.initDataUnsafe.user);
                }
            }, []);

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-blue-600 text-white p-6">
                        <h1 className="text-2xl font-bold mb-8">{t.title}</h1>
                        <button onClick={() => window.location.href = "https://t.me/YourBotUsername"} className="bg-white text-blue-600 px-8 py-3 rounded-full font-bold shadow-lg">
                            {t.login}
                        </button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 text-gray-900 font-sans">
                    <header className="bg-blue-600 text-white p-4 flex justify-between items-center shadow-lg">
                        <h1 className="text-lg font-bold">{t.welcome}, {user.first_name}</h1>
                        <select onChange={(e) => setLang(e.target.value)} value={lang} className="bg-blue-700 p-1 rounded text-sm">
                            <option value="kh">ខ្មែរ</option>
                            <option value="en">English</option>
                            <option value="zh">中文</option>
                        </select>
                    </header>
                    <main className="p-4">
                        <div className="bg-white p-6 rounded-2xl shadow-md border border-gray-100 text-center">
                            <h2 className="text-xl mb-4 font-semibold">{t.status}</h2>
                            <p className="text-green-600 font-bold mb-6">{t.insideZone}</p>
                            <div className="grid grid-cols-2 gap-4">
                                <button className="bg-green-500 text-white py-4 rounded-xl font-bold">{t.checkIn}</button>
                                <button className="bg-red-500 text-white py-4 rounded-xl font-bold">{t.checkOut}</button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
