<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaDing Check-in</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    input, button { width: 90%; padding: 15px; margin: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="registerBox">
    <h2>Register</h2>
    <input id="name" placeholder="Name">
    <button onclick="register()">Register</button>
  </div>
  <div id="mainBox" style="display:none;">
    <h2 id="welcomeText"></h2>
    <button onclick="check('IN')">Check-in</button>
    <button onclick="check('OUT')">Check-out</button>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxF_HWLbFuqv6J0P8D7EnmsoaWogEfLFC6kpzjhb8mCO_DGTTVUVAKS5knJjBOKHWia/exec"; // ដាក់ URL ថ្មីរបស់អ្នកនៅទីនេះ

    function register(){
      localStorage.setItem("name", document.getElementById("name").value);
      location.reload();
    }

    if(localStorage.getItem("name")){
      document.getElementById("registerBox").style.display="none";
      document.getElementById("mainBox").style.display="block";
      document.getElementById("welcomeText").innerText = "Welcome, " + localStorage.getItem("name");
    }

    function check(type){
      navigator.geolocation.getCurrentPosition(pos => {
        let input = document.createElement("input");
        input.type = "file"; input.accept = "image/*"; input.capture = "environment";
        input.onchange = () => {
          let reader = new FileReader();
          reader.onloadend = () => {
            fetch(API, {
              method: "POST",
              body: JSON.stringify({source:"web", name:localStorage.getItem("name"), type:type, lat:pos.coords.latitude, lng:pos.coords.longitude, image:reader.result.split(",")[1]})
            }).then(() => alert("Success ✅"));
          };
          reader.readAsDataURL(input.files[0]);
        };
        input.click();
      });
    }
  </script>
</body>
</html>
