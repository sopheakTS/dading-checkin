<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
<h2>Check In / Out</h2>

<button onclick="sendData('IN')">Check In</button>
<button onclick="sendData('OUT')">Check Out</button>

<br><br>
<button onclick="takePhoto()">📸 Take Photo</button>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbySXpe1Sl_1cziHndOBbgu9AQtI1k5S30h9VKHmDpUVDVTPuC0VBa_lA549XBQpgl5f/exec";

const tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let name = user?.first_name + " " + (user?.last_name || "");
let telegramId = user?.id;

let photoBase64 = "";

document.getElementById('photoInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(){
    photoBase64 = reader.result;
  }
  reader.readAsDataURL(file);
});

function takePhoto(){
  document.getElementById('photoInput').click();
}

function sendData(type){
  navigator.geolocation.getCurrentPosition(function(pos){

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        telegramId: telegramId,
        type: type,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        photo: photoBase64
      })
    })
    .then(res=>res.json())
    .then(res=>{
      if(res.status=="success"){
        alert("✅ Success");
      }else{
        alert("❌ "+res.message);
      }
    });

  });
}
</script>

</body>
</html>
