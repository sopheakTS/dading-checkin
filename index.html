<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Employees</h2>
<table border="1" id="empTable"></table>

<h2>Attendance</h2>
<table border="1" id="attTable"></table>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxOc3yeQ0U4Ix3QaYwnJ3jRqJXBeSa_HUxCnYpLOnbMjOjdXcEpCM8ChzVWg2zaGDY/exec";

async function loadData() {
  const res = await fetch(WEB_APP_URL);
  const data = await res.json();

  renderTable("empTable", data.employees);
  renderTable("attTable", data.attendance);
}

function renderTable(id, rows) {
  let html = "";

  rows.forEach((row, i) => {
    html += "<tr>";
    row.forEach(col => {
      html += `<td>${col}</td>`;
    });
    html += "</tr>";
  });

  document.getElementById(id).innerHTML = html;
}

loadData();
</script>

</body>
</html>
